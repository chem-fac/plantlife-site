<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全エピソード一覧 | プラントライフ</title>
    <link rel="canonical" href="https://plantlife.chem-fac.com/episodes/" />
    <meta name="description" content="技術者かねまるの「プラントライフ」全エピソード一覧。化学・プラント技術の解説をお好きなプラットフォームで。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" href="../images/favicon.png" type="image/png">
    <style>
        .all-ep-main {
            padding-top: calc(var(--header-h) + 40px);
            padding-bottom: 80px;
            min-height: 80vh;
        }

        .all-ep-count {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--light-muted);
            margin-bottom: 24px;
        }

        /* Search */
        .ep-search-wrap {
            margin-bottom: 32px;
        }

        .ep-search {
            width: 100%;
            max-width: 480px;
            padding: 12px 20px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--light-border);
            font-size: 0.9rem;
            font-family: var(--font-body);
            background: var(--light-surface);
            color: var(--light-text);
            transition: border-color 0.3s;
        }

        .ep-search:focus {
            outline: none;
            border-color: var(--brand);
        }

        /* Grid */
        .all-ep-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .all-ep-card {
            display: flex;
            flex-direction: column;
            background: var(--light-surface);
            border: 1px solid var(--light-border);
            overflow: hidden;
            transition: all 0.3s var(--ease);
        }

        .all-ep-card:hover {
            border-color: var(--brand);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .all-ep-thumb {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            flex-shrink: 0;
        }

        .all-ep-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .all-ep-body {
            padding: 12px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .all-ep-num {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--brand);
        }

        .all-ep-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--light-text);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .all-ep-date {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--light-muted);
        }

        .ep-no-results {
            text-align: center;
            padding: 48px 0;
            color: var(--light-muted);
            font-size: 0.9rem;
            display: none;
        }

        @media (max-width: 1024px) {
            .all-ep-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .all-ep-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>

<body>
    <header class="header scrolled" id="header">
        <div class="header-inner">
            <a href="/" class="header-logo">
                <img src="../images/plantlife_logo_nameonly.png" alt="プラントライフ" class="header-logo-img">
            </a>
            <nav class="header-nav" id="header-nav">
                <a href="/" class="nav-link">ホーム</a>
                <a href="/#platforms" class="nav-link">聴き方</a>
                <a href="/#episodes" class="nav-link active">エピソード</a>
                <a href="/#about" class="nav-link">番組について</a>
                <a href="../history/index.html" class="nav-link">番組の歩み</a>
                <a href="/#contact" class="nav-link">お問い合わせ</a>
            </nav>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="メニュー">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="all-ep-main">
        <div class="container">
            <div class="section-label">ALL EPISODES</div>
            <h1 class="section-heading">全エピソード一覧</h1>

            <div class="ep-search-wrap">
                <input type="search" id="ep-search" class="ep-search" placeholder="エピソードを検索…">
            </div>

            <div class="all-ep-count" id="ep-count"></div>
            <div class="all-ep-grid" id="all-ep-grid"></div>
            <p class="ep-no-results" id="ep-no-results">一致するエピソードが見つかりませんでした</p>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-brand">
                    <img src="../images/logo-footer.png" alt="PLANT LIFE" class="footer-logo-img">
                </div>
                <div class="footer-nav-group">
                    <h4>つながる</h4>
                    <a href="https://note.com/chem_fac" target="_blank" rel="noopener">note</a>
                    <a href="https://x.com/chem_fac" target="_blank" rel="noopener">X (Twitter)</a>
                    <a href="/#contact">お問い合わせ</a>
                </div>
                <div class="footer-nav-group">
                    <h4>聴く</h4>
                    <a href="https://open.spotify.com/show/4YLUGddgxbE2ipMBHFYIIX" target="_blank">Spotify</a>
                    <a href="https://podcasts.apple.com/us/podcast/%E6%8A%80%E8%A1%93%E8%80%85%E3%81%8B%E3%81%AD%E3%81%BE%E3%82%8B%E3%81%AE-%E3%83%97%E3%83%A9%E3%83%B3%E3%83%88%E3%83%A9%E3%82%A4%E3%83%95/id1789911793"
                        target="_blank">Apple Podcasts</a>
                    <a href="https://listen.style/p/14rlng1w" target="_blank">LISTEN</a>
                </div>
                <div class="footer-nav-group">
                    <h4>&nbsp;</h4>
                    <a href="https://music.amazon.co.jp/podcasts/1e2240a9-b053-46b3-b0a9-62b321a6eeb4"
                        target="_blank">Amazon
                        Music</a>
                    <a href="https://www.youtube.com/@chem_fac" target="_blank">YouTube</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 技術者かねまるの「プラントライフ」</p>
                <div class="footer-socials">
                    <a href="https://x.com/chem_fac" target="_blank">X</a>
                    <a href="https://note.com/chem_fac" target="_blank">note</a>
                    <a href="https://www.youtube.com/@chem_fac" target="_blank">YouTube</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('all-ep-grid');
            const search = document.getElementById('ep-search');
            const countEl = document.getElementById('ep-count');
            const noResults = document.getElementById('ep-no-results');
            let allEpisodes = [];

            // Mobile menu
            const btn = document.getElementById('mobile-menu-btn');
            const nav = document.getElementById('header-nav');
            if (btn && nav) {
                btn.addEventListener('click', () => {
                    btn.classList.toggle('open');
                    nav.classList.toggle('open');
                });
            }

            fetch('../episodes.json')
                .then(r => r.json())
                .then(data => {
                    allEpisodes = data
                        .filter(ep => ep.number && parseInt(ep.number) > 0)
                        .sort((a, b) => parseInt(b.number) - parseInt(a.number));
                    renderEpisodes(allEpisodes);
                });

            function renderEpisodes(episodes) {
                grid.innerHTML = '';
                countEl.textContent = `${episodes.length}件のエピソード`;
                noResults.style.display = episodes.length === 0 ? 'block' : 'none';

                episodes.forEach((ep, i) => {
                    let title = ep.title;
                    const m = title.match(/^#?\d+\s+(.+)/);
                    if (m) title = m[1];

                    const card = document.createElement('a');
                    card.href = `${ep.number}.html`;
                    card.className = 'all-ep-card';
                    card.innerHTML = `
            <div class="all-ep-thumb">
              <img src="${escapeHtml(ep.thumbnail || '../images/podcast-artwork.png')}" alt="${escapeHtml(title)}" loading="lazy">
            </div>
            <div class="all-ep-body">
              <span class="all-ep-num">#${ep.number}</span>
              <h3 class="all-ep-title">${escapeHtml(title)}</h3>
              <span class="all-ep-date">${ep.pub_date || ''}</span>
            </div>
          `;
                    grid.appendChild(card);
                });
            }

            search.addEventListener('input', () => {
                const q = search.value.toLowerCase().trim();
                if (!q) {
                    renderEpisodes(allEpisodes);
                    return;
                }
                const filtered = allEpisodes.filter(ep =>
                    ep.title.toLowerCase().includes(q) ||
                    (ep.description || '').toLowerCase().includes(q) ||
                    ep.number.includes(q)
                );
                renderEpisodes(filtered);
            });

            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }
        });
    </script>
</body>

</html>
